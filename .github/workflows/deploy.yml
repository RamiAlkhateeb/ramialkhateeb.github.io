name: Build and Deploy Portfolio Site

on:
  repository_dispatch:
    types: [ trigger-compiler ]  # This matches the event string fired by your Blazor App
  workflow_dispatch:              # Allows you to click a button manually on GitHub to force run

jobs:
  compile-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write             # Grants permission to save compiled files back to your repo

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0            # Pulls complete Git history safely

    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'   # Adjust to match your compiler project's targeting framework version

    - name: Run Static HTML Template Compiler
      run: dotnet run --project SiteGenerator/SiteGenerator.csproj
      # This builds your physical blog.html, guides.html, and individual posts!

    - name: Deploy Compiled Layout Assets to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # Built-in token managed by GitHub automatically
        publish_dir: ./                           # Serves your optimized static root directory files
        publish_branch: gh-pages                  # Branch that GitHub Pages points to