<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PostTitleEn}} | Rami Alkhateeb</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/site.css"> 
</head>
<body>
    <nav>
         </nav>

    <main class="main-container" style="padding-top: 100px; max-width: 800px; margin: 0 auto;">
        <article class="post-card">
            <p class="timeline-date"><i class="fa-regular fa-calendar"></i> {{PostDate}}</p>
            
            <div class="lang-en">
                <h1 class="project-title">{{PostTitleEn}}</h1>
                <hr>
                <div class="markdown-body">{{PostBodyEn}}</div>
            </div>
            
            <div class="lang-de">
                <h1 class="project-title">{{PostTitleDe}}</h1>
                <hr>
                <div class="markdown-body">{{PostBodyDe}}</div>
            </div>
        </article>
    </main>

    <script src="/js/site.js"></script>
</body>
</html>
