<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PostTitleEn}} | Rami Alkhateeb</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="lang-en">
    {{HEADER}}
    <main style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
        <article class="project-card">
            <p class="timeline-date"><i class="fa-regular fa-calendar"></i> {{PostDate}}</p>

            <div class="lang-en-content">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleEn}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryEn}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyEn}}</div>
            </div>

            <div class="lang-de-content">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleDe}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryDe}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyDe}}</div>
            </div>

            <div class="lang-ar-content">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleAr}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryAr}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyAr}}</div>
            </div>
        </article>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/blog.html" class="social-btn">
                <span class="lang-en-content">← Back to Blog</span>
                <span class="lang-de-content">← Zurück zum Blog</span>
                <span class="lang-ar-content">العودة إلى المدونة ➔</span>
            </a>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Rami Alkhateeb.</p>
    </footer>
    <script src="/js/site.js"></script>
</body>
</html>
