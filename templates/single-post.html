<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PostTitleEn}} | Rami Alkhateeb</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/site.css"> 
</head>
<body>
    
    <main class="main-container" style="padding-top: 100px; max-width: 800px; margin: 0 auto; padding-left:20px; padding-right:20px;">
        <article class="project-card">
            <p class="timeline-date"><i class="fa-regular fa-calendar"></i> {{PostDate}}</p>
            
            <div class="lang-en">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleEn}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryEn}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyEn}}</div>
            </div>
            
            <div class="lang-de">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleDe}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryDe}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyDe}}</div>
            </div>

            <div class="lang-ar">
                <h1 style="font-size: 2rem; margin-bottom: 10px;">{{PostTitleAr}}</h1>
                <p style="color: gray; font-style: italic; margin-bottom: 20px;">{{PostSummaryAr}}</p>
                <hr style="border: 0; border-top: 1px solid var(--timeline-line); margin-bottom: 20px;">
                <div class="markdown-body">{{PostBodyAr}}</div>
            </div>
        </article>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="/blog.html" class="social-btn" style="text-decoration: none;">
                <span class="lang-en">← Back to Blog Archive</span>
                <span class="lang-de">← Zurück zum Blog Archive</span>
                <span class="lang-ar">العودة إلى أرشيف المدونة ➔</span>
            </a>
        </div>
    </main>

    <script src="/js/site.js"></script>
</body>
</html>
