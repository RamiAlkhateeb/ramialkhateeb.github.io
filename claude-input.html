<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Mobile Input UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #212121;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .claude-card {
            background-color: #161616;
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            border: 1px solid #303030;
            padding: 20px 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* Top Section: Upgrade Prompt */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .pro-text {
            color: #d4d4d4;
            font-size: 15px;
            letter-spacing: -0.2px;
        }

        .upgrade-btn {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #4a4a4a;
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }

        /* Middle Section: Editable Text Area */
        .input-area {
            color: #ffffff;
            font-size: 20px;
            line-height: 1.35;
            font-weight: 400;
            outline: none;
            min-height: 80px;
            margin-bottom: 25px;
            /* letter-spacing: -0.3px; */
        }

        .input-area br {
            display: none;
        }

        .input-area * {
            display: inline;
        }

        /* Bottom Section: Toolbar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-actions,
        .right-actions {
            display: flex;
            align-items: center;
        }

        .left-actions {
            gap: 16px;
        }

        .right-actions {
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .model-selector {
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
        }

        .model-selector .sub-text {
            color: #888888;
        }

        .send-btn {
            background-color: #d26e4b;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Utility Tooling (Not part of Claude UI) */
        .utility-bar {
            margin-top: 40px;
        }

        .capture-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .capture-btn:hover {
            background-color: #2563eb;
        }

        .capture-btn:active {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>

    <div class="claude-card" id="capture-target">
        

        <div class="input-area" contenteditable="true" spellcheck="false" dir="auto">
            This function is returning the wrong result. Can you fix it?
        </div>

        <div class="bottom-bar">
            <div class="left-actions">
                <button class="icon-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <span class="model-selector">Sonnet 5 <span class="sub-text">Medium</span></span>
            </div>

            <div class="right-actions">
                <button class="icon-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a3a3a3" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>
                <button class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="utility-bar">
        <button class="capture-btn" onclick="copyScreenshot()">📸 Copy to Clipboard</button>
    </div>

    <script>
        async function copyScreenshot() {
            const target = document.getElementById('capture-target');
            const btn = document.querySelector('.capture-btn');
            const originalText = btn.innerText;

            btn.innerText = "Capturing...";

            try {
                // 1. Render the element to a canvas (set background to null for transparency)
                const canvas = await html2canvas(target, {
                    backgroundColor: null, 
                    scale: 2, 
                    useCORS: true
                });

                // 2. Create a new canvas to apply the rounded clipping mask
                const roundedCanvas = document.createElement('canvas');
                roundedCanvas.width = canvas.width;
                roundedCanvas.height = canvas.height;
                const ctx = roundedCanvas.getContext('2d');

                // The border radius of your card is 28px. 
                // We multiply by 2 because your html2canvas scale is 2.
                const radius = 28 * 2; 

                // 3. Draw the rounded rectangle path
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(roundedCanvas.width - radius, 0);
                ctx.quadraticCurveTo(roundedCanvas.width, 0, roundedCanvas.width, radius);
                ctx.lineTo(roundedCanvas.width, roundedCanvas.height - radius);
                ctx.quadraticCurveTo(roundedCanvas.width, roundedCanvas.height, roundedCanvas.width - radius, roundedCanvas.height);
                ctx.lineTo(radius, roundedCanvas.height);
                ctx.quadraticCurveTo(0, roundedCanvas.height, 0, roundedCanvas.height - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();

                // 4. Clip the canvas to that path and draw the original image inside it
                ctx.clip();
                ctx.drawImage(canvas, 0, 0);

                // 5. Convert the NEW rounded canvas to blob and copy
                roundedCanvas.toBlob(async (blob) => {
                    try {
                        const item = new ClipboardItem({ 'image/png': blob });
                        await navigator.clipboard.write([item]);
                        btn.innerText = "✅ Copied!";
                    } catch (err) {
                        console.error('Clipboard write failed:', err);
                        alert('Failed to copy to clipboard. Ensure you are using a secure context (HTTPS or localhost).');
                        btn.innerText = "❌ Copy Failed";
                    }

                    setTimeout(() => {
                        btn.innerText = originalText;
                    }, 2000);

                }, 'image/png');

            } catch (err) {
                console.error('html2canvas failed:', err);
                btn.innerText = "❌ Error";
                setTimeout(() => btn.innerText = originalText, 2000);
            }
        }
    </script>
</body>

</html>
